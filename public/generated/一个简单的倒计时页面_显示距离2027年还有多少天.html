<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>距离2027年 · 倒计时</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b1a2e 0%, #1a2f3f 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    .card {
      max-width: 780px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 64px;
      padding: 2.8rem 2rem 3.2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.04);
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    h1 {
      font-weight: 400;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: rgba(255, 255, 255, 0.75);
      text-align: center;
      margin-bottom: 1.8rem;
      word-break: keep-all;
    }

    h1 strong {
      font-weight: 600;
      color: #f6e9b2;
      background: linear-gradient(135deg, #f7e05e, #f6c445);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 12px rgba(246, 196, 69, 0.3);
    }

    .countdown-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 1.2rem 1.8rem;
      margin: 1.5rem 0 0.8rem;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 90px;
    }

    .time-number {
      font-size: 4.2rem;
      font-weight: 700;
      line-height: 1;
      color: #ffffff;
      background: rgba(10, 25, 40, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      padding: 0.25rem 0.5rem;
      border-radius: 24px;
      min-width: 120px;
      text-align: center;
      letter-spacing: 4px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.4), 0 8px 18px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 215, 100, 0.15);
      transition: 0.2s;
      font-variant-numeric: tabular-nums;
    }

    .time-label {
      margin-top: 0.6rem;
      font-size: 1rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255, 255, 240, 0.6);
      background: rgba(0, 0, 0, 0.2);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 200, 0.06);
    }

    .separator-days {
      font-size: 2.2rem;
      color: rgba(255, 215, 100, 0.25);
      font-weight: 100;
      padding: 0 0.2rem;
      display: none; 
    }

    .extra-info {
      margin-top: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem 1.8rem;
      color: rgba(255, 255, 240, 0.5);
      font-size: 1rem;
      border-top: 1px solid rgba(255, 255, 200, 0.08);
      padding-top: 2rem;
    }

    .extra-info span {
      background: rgba(0, 0, 0, 0.2);
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 200, 0.04);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .extra-info .highlight {
      color: #f6d27a;
      font-weight: 500;
    }

    .footer-note {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 1px;
    }

    .footer-note i {
      font-style: normal;
      background: rgba(255, 215, 0, 0.1);
      padding: 0.1rem 0.6rem;
      border-radius: 20px;
    }

    /* 响应式 */
    @media (max-width: 600px) {
      .card {
        padding: 2rem 1.2rem 2.5rem;
        border-radius: 48px;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 1.2rem;
      }
      .time-number {
        font-size: 3.2rem;
        min-width: 100px;
        padding: 0.2rem 0.2rem;
      }
      .time-block {
        min-width: 70px;
      }
      .countdown-grid {
        gap: 0.8rem 0.5rem;
      }
      .time-label {
        font-size: 0.75rem;
        letter-spacing: 2px;
        padding: 0.1rem 0.8rem;
      }
      .extra-info {
        font-size: 0.85rem;
        gap: 0.5rem 1rem;
      }
    }

    @media (max-width: 420px) {
      .time-number {
        font-size: 2.6rem;
        min-width: 80px;
      }
      .time-block {
        min-width: 60px;
      }
    }

    /* 微光动画 */
    @keyframes softGlow {
      0% { box-shadow: 0 0 0 0 rgba(246, 196, 69, 0.1); }
      50% { box-shadow: 0 0 18px 4px rgba(246, 196, 69, 0.08); }
      100% { box-shadow: 0 0 0 0 rgba(246, 196, 69, 0.1); }
    }
    .time-number {
      animation: softGlow 4s infinite ease-in-out;
    }

    /* 数字跳动微效 */
    .time-number.flash {
      transition: transform 0.08s ease;
    }
  </style>
</head>
<body>
<div class="card" role="main" aria-label="倒计时距离2027年">
  <h1>⏳ 距离 <strong>2027</strong> 年</h1>

  <div class="countdown-grid" id="countdownDisplay">
    <!-- 天 -->
    <div class="time-block">
      <div class="time-number" id="daysNumber">--</div>
      <div class="time-label">天</div>
    </div>
    <!-- 时 -->
    <div class="time-block">
      <div class="time-number" id="hoursNumber">--</div>
      <div class="time-label">时</div>
    </div>
    <!-- 分 -->
    <div class="time-block">
      <div class="time-number" id="minutesNumber">--</div>
      <div class="time-label">分</div>
    </div>
    <!-- 秒 -->
    <div class="time-block">
      <div class="time-number" id="secondsNumber">--</div>
      <div class="time-label">秒</div>
    </div>
  </div>

  <div class="extra-info">
    <span>🗓️ 2027年1月1日 00:00</span>
    <span>✨ 已过去 <span class="highlight" id="yearProgress">0</span>% 的2026年</span>
  </div>

  <div class="footer-note">
    <i>⚡ 每秒钟都在靠近 · 未来可期</i>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // DOM 元素
    const daysEl = document.getElementById('daysNumber');
    const hoursEl = document.getElementById('hoursNumber');
    const minutesEl = document.getElementById('minutesNumber');
    const secondsEl = document.getElementById('secondsNumber');
    const progressEl = document.getElementById('yearProgress');

    // 目标日期：2027-01-01 00:00:00 (北京时间)
    const TARGET = new Date(2027, 0, 1, 0, 0, 0, 0); // 月份0 = 一月

    // 辅助：补零或格式化（至少两位）
    function formatNumber(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    // 更新倒计时
    function updateCountdown() {
      const now = new Date();

      // 计算差值（毫秒）
      let diff = TARGET.getTime() - now.getTime();

      // 如果已经过了2027年，显示 00 天 00:00:00
      if (diff <= 0) {
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        progressEl.textContent = '100.00';
        return;
      }

      // 转换为正数
      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      // 更新显示（保留两位数字）
      daysEl.textContent = days;
      hoursEl.textContent = formatNumber(hours);
      minutesEl.textContent = formatNumber(minutes);
      secondsEl.textContent = formatNumber(seconds);

      // 计算 2026 年已过百分比 (基于当前时间)
      const startOf2026 = new Date(2026, 0, 1, 0, 0, 0, 0);
      const endOf2026 = new Date(2026, 11, 31, 23, 59, 59, 999);
      const totalYear = endOf2026.getTime() - startOf2026.getTime();
      let elapsed = now.getTime() - startOf2026.getTime();

      // 防止超出范围 (如果当前在2026之前或之后)
      if (elapsed < 0) elapsed = 0;
      if (elapsed > totalYear) elapsed = totalYear;

      const percent = (elapsed / totalYear) * 100;
      progressEl.textContent = percent.toFixed(2);
    }

    // 立即更新
    updateCountdown();

    // 每秒更新
    setInterval(updateCountdown, 1000);

    // 可选：微小的数字跳动效果（视觉反馈）
    const numberEls = [daysEl, hoursEl, minutesEl, secondsEl];
    numberEls.forEach(el => {
      el.addEventListener('transitionend', () => {
        el.classList.remove('flash');
      });
    });

    // 额外：每次数字变化加一个微闪 (仅视觉效果)
    let lastValues = { days: '', hours: '', minutes: '', seconds: '' };
    setInterval(() => {
      const d = daysEl.textContent;
      const h = hoursEl.textContent;
      const m = minutesEl.textContent;
      const s = secondsEl.textContent;
      if (d !== lastValues.days) { lastValues.days = d; triggerFlash(daysEl); }
      if (h !== lastValues.hours) { lastValues.hours = h; triggerFlash(hoursEl); }
      if (m !== lastValues.minutes) { lastValues.minutes = m; triggerFlash(minutesEl); }
      if (s !== lastValues.seconds) { lastValues.seconds = s; triggerFlash(secondsEl); }
    }, 200);

    function triggerFlash(el) {
      if (!el) return;
      el.style.transform = 'scale(1.02)';
      setTimeout(() => { el.style.transform = 'scale(1)'; }, 120);
    }

    // 页面可见性变化时强制刷新 (保证切回来时准确)
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
        updateCountdown();
      }
    });

    // 触摸/点击友好 (无额外操作)
    console.log('⏳ 距离2027年倒计时已启动');
  })();
</script>
</body>
</html>
