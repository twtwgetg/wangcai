<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能体聊天</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: rgba(0, 0, 0, 0.2);
      padding: 20px;
    }

    .header h1 {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .status {
      font-size: 0.85rem;
      color: #aaa;
    }

    .status.connected {
      color: #4ade80;
    }

    .clear-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 107, 107, 0.3);
      color: #ff6b6b;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s;
    }

    .clear-btn:hover {
      background: rgba(255, 107, 107, 0.5);
    }

    .chat-container {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      animation: fadeIn 0.3s ease;
      word-wrap: break-word;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .message.system {
      align-self: center;
      background: rgba(251, 191, 36, 0.2);
      color: #ffc107;
      font-size: 0.85rem;
      text-align: center;
      padding: 8px 16px;
    }

    .input-container {
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      gap: 10px;
    }

    .input-container input {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: background 0.3s;
    }

    .input-container input::placeholder {
      color: #888;
    }

    .input-container input:focus {
      background: rgba(255, 255, 255, 0.15);
    }

    .input-container button {
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .input-container button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .input-container button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      animation: typing 1.4s infinite;
      margin: 0 2px;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-8px); }
    }

    .markdown-content {
      line-height: 1.6;
    }

    .markdown-content pre {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .markdown-content code {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.9em;
    }

    .markdown-content p {
      margin: 6px 0;
    }

    .markdown-content ul, .markdown-content ol {
      margin: 6px 0;
      padding-left: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 智能体聊天</h1>
      <div class="header-top">
        <div class="status" id="status">连接中...</div>
        <button class="clear-btn" onclick="clearChat()">清空对话</button>
      </div>
    </div>
    <div class="chat-container" id="chatContainer"></div>
    <div class="input-container">
      <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <script>
    let ws = null;
    let sessionId = 'session-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
    let isGenerating = false;

    // 连接 WebSocket
    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

      ws.onopen = () => {
        document.getElementById('status').textContent = '● 已连接';
        document.getElementById('status').classList.add('connected');
      };

      ws.onclose = () => {
        document.getElementById('status').textContent = '○ 已断开';
        document.getElementById('status').classList.remove('connected');
        console.log('重连中...');
        setTimeout(connect, 2000);
      };

      ws.onerror = (error) => {
        console.error('WebSocket 错误:', error);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleServerMessage(data);
      };
    }

    // 处理服务器消息
    function handleServerMessage(data) {
      switch (data.type) {
        case 'chunk':
          if (isGenerating) {
            appendToLastAssistantMessage(data.content);
          } else {
            isGenerating = true;
            addAssistantMessage(data.content, true);
          }
          break;
        case 'done':
          isGenerating = false;
          removeTypingIndicator();
          scrollToBottom();
          break;
        case 'error':
          addSystemMessage('错误：' + data.message);
          isGenerating = false;
          break;
      }
    }

    // 添加消息
    function addMessage(text, type) {
      const container = document.getElementById('chatContainer');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;
      messageDiv.innerHTML = formatMessage(text);
      container.appendChild(messageDiv);
      scrollToBottom();
    }

    // 格式化消息（简单处理换行）
    function formatMessage(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    // 添加用户消息
    function addUserMessage(text) {
      addMessage(text, 'user');
    }

    // 添加助手消息
    function addAssistantMessage(text, isStreaming = false) {
      const container = document.getElementById('chatContainer');
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message assistant';
      messageDiv.id = 'last-assistant-message';
      messageDiv.innerHTML = formatMessage(text);
      if (isStreaming) {
        messageDiv.innerHTML += '<span class="typing-indicator"><span></span><span></span><span></span></span>';
      }
      container.appendChild(messageDiv);
      scrollToBottom();
    }

    // 追加到最后一条助手消息
    function appendToLastAssistantMessage(text) {
      const lastMessage = document.getElementById('last-assistant-message');
      if (lastMessage) {
        const typingIndicator = lastMessage.querySelector('.typing-indicator');
        if (typingIndicator) {
          typingIndicator.remove();
        }
        const currentText = lastMessage.textContent;
        lastMessage.innerHTML = formatMessage(currentText + text);
      }
    }

    // 添加系统消息
    function addSystemMessage(text) {
      addMessage(text, 'system');
    }

    // 移除打字指示器
    function removeTypingIndicator() {
      const indicator = document.querySelector('.typing-indicator');
      if (indicator) {
        indicator.remove();
      }
    }

    // 滚动到底部
    function scrollToBottom() {
      const container = document.getElementById('chatContainer');
      container.scrollTop = container.scrollHeight;
    }

    // 发送消息
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      
      if (!text || isGenerating) return;

      addUserMessage(text);
      input.value = '';

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ message: text, session_id: sessionId }));
      }
    }

    // 清空对话
    function clearChat() {
      document.getElementById('chatContainer').innerHTML = '';
      sessionId = 'session-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
      addSystemMessage('对话已清空');
    }

    // 回车发送
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // 启动连接
    connect();
  </script>
</body>
</html>
