<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旺财 AI 助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:#f5f5f5;height:100vh;display:flex;flex-direction:column}
header{background:#1565C0;color:#fff;padding:14px 20px;font-size:18px;font-weight:600;text-align:center}
.mic-btn{width:40px;height:40px;border-radius:50%;border:2px solid #1565C0;background:#fff;color:#1565C0;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.2s}
.mic-btn.recording{background:#e53935;border-color:#e53935;color:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.mic-btn:disabled{opacity:.4;cursor:not-allowed}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg.user{background:#1565C0;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.assistant{background:#fff;color:#333;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.msg.system{background:#fff3e0;color:#e65100;align-self:center;font-size:13px;border-radius:6px}
.msg img{max-width:200px;border-radius:6px;margin:4px 0;cursor:pointer}
.msg audio{width:100%;max-width:300px;margin:4px 0}
.msg video{width:100%;max-width:300px;border-radius:6px;margin:4px 0}
.msg a{color:#1565C0}
#input-bar{display:flex;padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0;gap:8px}
#input-bar input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:0}
#input-bar input:focus{border-color:#1565C0}
#input-bar button{padding:10px 20px;background:#1565C0;color:#fff;border:0;border-radius:8px;font-size:15px;cursor:pointer}
#input-bar button:disabled{opacity:.5}
.status{font-size:12px;color:#999;text-align:center;padding:4px}
</style>
</head>
<body>
<header>🤖 旺财 AI 助手</header>
<div id="messages"></div>
<div id="input-bar">
  <input id="input" type="text" placeholder="输入消息..." disabled>
  <button id="mic" class="mic-btn" disabled title="语音输入">🎤</button>
  <button id="send" disabled>发送</button>
</div>
<div class="status" id="status">正在连接...</div>

<script>
const wsUrl = `ws://${location.host}?role=app`;
let ws = null;
let sessionId = 'web_' + Date.now();

const el = id => document.getElementById(id);
const msgBox = el('messages');
const input = el('input');
const sendBtn = el('send');
const status = el('status');

function addMsg(role, html) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = html;
  msgBox.appendChild(d);
  msgBox.scrollTop = msgBox.scrollHeight;
  return d;
}

function renderContent(text) {
  let t = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
  t = t.replace(/\[IMG\](.*?)\[\/IMG\]/g, '<br><img src="$1" loading="lazy"><br>');
  t = t.replace(/\[AUDIO_BASE64\](.*?)\[\/AUDIO_BASE64\]/g, '<br><audio controls autoplay src="data:audio/mpeg;base64,$1"></audio><br>');
  t = t.replace(/\[AUDIO\](.*?)\[\/AUDIO\]/g, '<br><audio controls autoplay src="$1"></audio><br>');
  t = t.replace(/\[VIDEO\](.*?)\[\/VIDEO\]/g, '<br><video controls src="$1" style="max-height:300px"></video><br>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function connect() {
  status.textContent = '正在连接...';
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    status.textContent = '已连接';
    input.disabled = false;
    sendBtn.disabled = false;
    micBtn.disabled = false;
    input.focus();
  };

  ws.onclose = () => {
    status.textContent = '连接断开，3秒后重连...';
    input.disabled = true;
    sendBtn.disabled = true;
    micBtn.disabled = true;
    micBtn.textContent = '🎤';
    setTimeout(connect, 3000);
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'chunk' && data.content) {
        let streaming = msgBox.querySelector('.streaming');
        if (!streaming) streaming = addMsg('assistant', '');
        streaming.classList.add('streaming');
        streaming.innerHTML += renderContent(data.content);
        msgBox.scrollTop = msgBox.scrollHeight;
      } else if (data.type === 'done') {
        const s = msgBox.querySelector('.streaming');
        if (s) s.classList.remove('streaming');
      } else if (data.type === 'connected') {
        console.log('Connected as', data.role, data.id);
      }
    } catch(e) {}
  };

  ws.onerror = () => {
    status.textContent = '连接异常';
  };
}

function sendMsg() {
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  addMsg('user', text);
  input.value = '';
  ws.send(JSON.stringify({ type: 'chat', message: text, session_id: sessionId }));
}

sendBtn.onclick = sendMsg;
input.onkeydown = e => { if (e.key === 'Enter') sendMsg(); };

// --- Microphone recording ---
const micBtn = el('mic');
let mediaRecorder = null;
let audioChunks = [];

micBtn.onclick = function() {
  console.log('[MIC] clicked, disabled=' + micBtn.disabled + ', recorder=' + (mediaRecorder ? mediaRecorder.state : 'null'));
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    micBtn.textContent = '⏳';
    mediaRecorder.stop();
    return;
  }
  micBtn.textContent = '...';
  micBtn.disabled = true;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    addMsg('system', '浏览器不支持麦克风');
    micBtn.textContent = '🎤';
    micBtn.disabled = false;
    return;
  }
  console.log('[MIC] requesting getUserMedia...');
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream) {
    console.log('[MIC] got stream');
    var mime = 'audio/webm;codecs=opus';
    if (!MediaRecorder.isTypeSupported(mime)) mime = 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
    audioChunks = [];
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      micBtn.disabled = false;
      var blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (blob.size < 1000) return;
      addMsg('system', '🎤 语音识别中...');
      ws.send(blob);
    };
    mediaRecorder.onerror = function() {
      micBtn.textContent = '🎤';
      micBtn.disabled = false;
      addMsg('system', '❌ 录音出错');
    };
    mediaRecorder.start();
    micBtn.classList.add('recording');
    micBtn.textContent = '⏹';
    micBtn.disabled = false;
  }).catch(function(e) {
    addMsg('system', '❌ 无法访问麦克风: ' + e.message);
    micBtn.textContent = '🎤';
    micBtn.disabled = false;
  });
};

connect();
</script>
</body>
</html>
